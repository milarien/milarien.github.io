<p align="center"><font face="Comic Sans MS"><big>These spiders are really very small -
only 2 or 3mm (maybe a 1/4 inch), but they can jump quite a distance.&nbsp; We have a lot
of them here, but they are so small that they generally go unnoticed.&nbsp; They are
harmless to people and very beautifully colored.</big></font></p>
