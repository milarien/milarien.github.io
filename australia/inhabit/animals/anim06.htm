<p align="center">&nbsp;</p>

<p align="center"><font color="#FFFF00"><big>These bats get their name from their very
silent flight and their pale, ghostly appearance. They hang from trees and rock ledges,
and fly out to catch prey in the air or on the ground. They tend to roost in caves, in
groups of ten or more.</big></font></p>

<p align="center"><font color="#FFFF00"><big><br>
Picture: G B Baker</big></font></p>
