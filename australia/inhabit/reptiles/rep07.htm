<p align="center"><font face="Comic Sans MS"><big>This particular skink is found through
New South Wales, Queensland and Victoria.&nbsp; Although we see a lot of skinks in our
garden, they very rarely are still long enough to identify them.&nbsp; As well, they are,
unfortunately, a favourite 'toy' for cats.</big></font></p>
