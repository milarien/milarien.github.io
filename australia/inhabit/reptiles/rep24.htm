<font face="Comic Sans MS"><big>These tortoises are extremely rare and highly endangered.
&nbsp; In the 1980's there were only 30 left in the world, but careful management has
brought the numbers up to aapproximtely 90.&nbsp; They are only 15cm long (approx. 6
inches).</big></font></p>
