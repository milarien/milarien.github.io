<p align="center"><font face="Comic Sans MS" color="#FFFF00"><big>Pairs mate for life and
drop out of the flock to breed, rejoining the flock later.&nbsp; We have a lot of
silvereyes in our garden, although the ones here in Summer are a more southern species and
have pale orange on their breasts. 12.5cm (5 inches).</big></font></p>
