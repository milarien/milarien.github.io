<p align="center"><font face="Comic Sans MS" color="#FFFF00"><big>We have a very large
flock of these beautiful birds living in our garden. They come down to the fountain to
drink and bathe and can often be seen feeding under the plum tree. The pair bond is very
strong and seems to be permanent. 11-12cm (4-5 inches).</big></font></p>
