<p align="center"><font face="Comic Sans MS"><big>This is not actually Buchan, but it is
fairly close, and Buchan is the nearest town.&nbsp; It's a back road, and is fairly
typical of the scenery through the mountains around the area.&nbsp; There are some
spectacular caves at Buchan as well.</big></font></p>
