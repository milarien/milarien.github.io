<font face="Comic Sans MS"><big>This is somewhere around Sherbrooke Forest.&nbsp; It's a
stunning area not far out of Melbourne, up in the Dandenongs.&nbsp; There's a lookout
where the lights of Melbourne look just like fairy lights scattered across the land, and
it is perhaps the most peaceful area I know.</big></font></p>
