<p align="center"><font face="Comic Sans MS"><big>Mildura is a huge fruit and vegetable
producing area.&nbsp; It is quite an attractive town, up on the border of Victoria and New
South Wales.&nbsp; This is one of the steamers that regularly go up and down the Murray
river in the area, mainly for tourists.&nbsp; It's a fun trip to take.</big></font></p>
