<p align="center"><font face="Comic Sans MS"><big>Mallacoota is a very beautiful area near
the border of New South Wales.&nbsp; We used to holiday here quite often when I was a
child.&nbsp; There's good fishing, good sailing and a lot of places to just enjoy the
peace of the area.</big></font></p>

<p align="center"><font face="Comic Sans MS"><big>Photographer: Mark or Jean Stokes</big></font></p>
