<p align="center"><font face="Comic Sans MS"><big>You'll find these scattered all around
the Territory.&nbsp; Some of them are 4-5 metres high (14-16 feet).&nbsp; Apparently the
way they are built keeps them cool, and the environment stable.&nbsp; They are certainly
very impressive!</big></font></p>
