<p align="center"><font face="Comic Sans MS"><big>The Devil's Marbles are a collection of
very precariously placed granite rocks.&nbsp; Aboriginal mythology says they were placed
here by the Rainbow Serpent.&nbsp; They're about 100km (60 miles) south of Tennant Creek .</big></font></p>
