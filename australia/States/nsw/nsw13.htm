<p align="center"><font face="Comic Sans MS"><big>Ballina is a very popular holiday
destination.&nbsp; It's right up at the top of New South Wales, and has very temperate
weather most of the year.&nbsp; Warm, sunny, beautiful beaches, and the surrounding
countryside is lovely as well.</big></font></p>
