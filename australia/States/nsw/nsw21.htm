<p align="center"><font face="Comic Sans MS"><big>Sydney is Australia's biggest city, in
terms of population.&nbsp; It's also the city most international travellers first arrive
at.&nbsp; The harbour is beautiful and great for sailing.&nbsp; There is a great deal to
see and do in Sydney and a visit to The Rocks is a must!</big></font></p>
