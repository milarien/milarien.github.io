<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="aurora-lens-api-base" content="" />
<title>Aurora-Lens Demo</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    margin: 0;
}

header {
    padding: 12px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
}

.container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    padding: 10px;
}

.panel {
    background: #1b1b1b;
    border: 1px solid #333;
    padding: 10px;
}

h3 {
    margin-top: 0;
}

.blocked {
    background: #2a1414;
    border: 1px solid #aa4444;
    padding: 8px;
}

.allowed {
    background: #142a14;
    border: 1px solid #44aa44;
    padding: 8px;
}

.audit {
    font-family: monospace;
    font-size: 12px;
}

button {
    margin: 4px;
    padding: 6px 10px;
    background: #333;
    color: #eee;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #555;
}

input {
    width: 80%;
    padding: 6px;
}
</style>
</head>

<body>

<header>
<strong>Aurora-Lens</strong> — Admissibility before consequence  
<span id="authority"></span>
</header>

<div class="container">

<!-- Conversation -->
<div class="panel">
<h3>Conversation</h3>
<div id="messages"></div>

<div id="clarification" style="display:none;"></div>

<div id="inputBox">
<input id="prompt" placeholder="Ask something..." />
<button onclick="run()">Run</button>
</div>
</div>

<!-- Model Output -->
<div class="panel">
<h3>Model Output</h3>

<div id="blocked" class="blocked" style="display:none;"></div>
<div id="released" class="allowed"></div>

</div>

<!-- Governance -->
<div class="panel">
<h3>Governance Decision</h3>
<div id="governance"></div>
</div>

<!-- Audit -->
<div class="panel audit">
<h3>Forensic Audit</h3>
<div id="audit"></div>
</div>

</div>

<script>

let sessionId = null;
const SERVICE_ORIGIN = (function () {
    try {
        return atob("aHR0cHM6Ly9hdXJvcmFsZW5zLXByb2R1Y3Rpb24udXAucmFpbHdheS5hcHA=");
    } catch (_e) {
        return "";
    }
})();
const metaApiBase = document.querySelector('meta[name="aurora-lens-api-base"]');
const API_BASE = (function () {
    const fromMeta = metaApiBase ? String(metaApiBase.content || "").trim() : "";
    if (fromMeta) return fromMeta.replace(/\/+$/, "");
    if (SERVICE_ORIGIN) return String(SERVICE_ORIGIN).replace(/\/+$/, "");
    return String(window.location.origin || "").replace(/\/+$/, "");
})();

async function run(text=null) {

    const prompt = text || document.getElementById("prompt").value;
    if (!String(prompt || "").trim()) return;
    const headers = {"Content-Type": "application/json"};
    if (sessionId) headers["x-aurora-session-id"] = sessionId;
    headers["x-aurora-operator-detail"] = "1";

    const res = await fetch(API_BASE + "/v1/chat/completions", {
        method: "POST",
        headers,
        body: JSON.stringify({
            messages: [{role: "user", content: prompt}],
            session_id: sessionId
        })
    });

    const data = await res.json();

    sessionId = data.session_id;

    render(data);
}

function render(data) {
    const payload = data.aurora || data;
    const governance = data.governance || payload.governance || {};
    const operatorPef = data.operator_pef || payload.operator_pef || {};
    const audit = data.audit || payload.audit || {};
    const output = data.output
        || ((((data.choices || [])[0] || {}).message || {}).content)
        || payload.response_message
        || "";
    const inputText = data.input || "";
    const blockedOutput = data.blocked_output || payload.original_response || "";
    const authorityClass = data.authority_class || payload.authority_class || "unknown";
    const domain = data.domain || payload.domain || "unknown";

    const msgDiv = document.getElementById("messages");
    const clarDiv = document.getElementById("clarification");
    const blockedDiv = document.getElementById("blocked");
    const releasedDiv = document.getElementById("released");
    const govDiv = document.getElementById("governance");
    const auditDiv = document.getElementById("audit");
    const authority = document.getElementById("authority");

    authority.innerText = " | Authority: " + authorityClass;

    msgDiv.innerHTML += `<div><strong>User:</strong> ${inputText}</div>`;

    // ------------------
    // CLARIFICATION
    // ------------------
    if (operatorPef?.pending_clarification?.active) {

        const pc = operatorPef.pending_clarification;
        const candidates = Array.isArray(pc.candidate_entities) ? pc.candidate_entities : [];

        clarDiv.style.display = "block";
        document.getElementById("inputBox").style.display = "none";

        clarDiv.innerHTML = `
        <strong>Clarification required</strong><br><br>
        ${pc.clarification_prompt}<br><br>
        ${candidates.map(c =>
            `<button type="button" class="clarify-option" data-value="${encodeURIComponent(c)}">${c}</button>`
        ).join("")}
        `;
        clarDiv.querySelectorAll(".clarify-option").forEach((btn) => {
            btn.addEventListener("click", () => run(decodeURIComponent(btn.dataset.value || "")));
        });

    } else {
        clarDiv.style.display = "none";
        document.getElementById("inputBox").style.display = "block";
    }

    // ------------------
    // MODEL OUTPUT
    // ------------------
    if (blockedOutput) {
        blockedDiv.style.display = "block";
        blockedDiv.innerHTML =
            "<strong>Blocked model output</strong><br>" +
            blockedOutput;
    } else {
        blockedDiv.style.display = "none";
    }

    releasedDiv.innerHTML =
        "<strong>Released</strong><br>" + output;

    // ------------------
    // GOVERNANCE
    // ------------------
    govDiv.innerHTML = `
    Status: ${governance.status}<br>
    Authority: ${authorityClass}<br>
    Domain: ${domain}<br>
    Failed constraints: ${JSON.stringify(governance.audit_flags)}<br><br>
    <strong>Allowed continuation</strong><br>
    ${governance.allowed_continuation || "None"}
    `;

    // ------------------
    // AUDIT
    // ------------------
    auditDiv.innerHTML = `
    trace_id: ${audit?.trace_id}<br>
    HMAC verified: ${audit?.hmac_verified}<br>
    Chain verified: ${audit?.chain_verified}<br>
    Fully verified: ${audit?.fully_verified}<br>
    prev_hash: ${audit?.prev_hash}<br>
    hash: ${audit?.hash}
    `;
}

</script>

</body>
</html>
