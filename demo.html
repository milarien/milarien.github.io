<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aurora Lens - Governance Workflow Demo</title>
  <style>
    :root { --bg:#0b1220; --panel:#121b2e; --line:#24324e; --text:#eaf0ff; --muted:#9fb0d1; --ok:#32d296; --warn:#f2c969; --bad:#ff7b8a; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:14px/1.45 Segoe UI,Arial,sans-serif; }
    .wrap { max-width:1200px; margin:0 auto; padding:20px; }
    h1 { margin:0 0 4px; font-size:22px; }
    .sub { color:var(--muted); margin:0 0 14px; }
    .bar { display:flex; gap:10px; align-items:flex-end; background:var(--panel); border:1px solid var(--line); padding:12px; border-radius:10px; }
    .field { display:grid; gap:6px; flex:1; }
    .field label { color:var(--muted); font-size:12px; }
    input, select, button, textarea { width:100%; background:#0f1728; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
    button { width:auto; cursor:pointer; font-weight:600; }
    .flow { margin-top:14px; display:grid; gap:12px; }
    .turn { border:1px solid var(--line); border-radius:10px; padding:12px; background:var(--panel); display:grid; gap:10px; }
    .grid { display:grid; gap:10px; grid-template-columns:1fr 1fr; }
    .card { border:1px solid var(--line); border-radius:8px; padding:10px; background:#0f1728; }
    .title { margin:0 0 6px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    .decision { font-weight:700; }
    .released { color:var(--ok); } .blocked { color:var(--bad); } .contained { color:var(--warn); } .continuing { color:#8ecbff; }
    pre { margin:0; white-space:pre-wrap; word-break:break-word; font-family:ui-monospace,Consolas,monospace; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Route Through Aurora</h1>
    <p class="sub">Request -> Decision -> Why -> Safe output + Integration payload</p>
    <div class="bar">
      <div class="field">
        <label for="domain">Selected domain</label>
        <select id="domain">
          <option value="general">general</option>
          <option value="finance">finance</option>
          <option value="legal">legal</option>
          <option value="medical">medical</option>
        </select>
      </div>
      <div class="field" style="flex:3">
        <label for="prompt">Request</label>
        <textarea id="prompt" rows="2">What are the typical symptoms of a middle ear infection?</textarea>
      </div>
      <button id="send">Route request</button>
    </div>
    <div id="flow" class="flow"></div>
  </div>

  <script>
    const meta = document.querySelector('meta[name="aurora-lens-api-base"]');
    const API_BASE = meta ? meta.content : window.location.origin;
    const sid = "workflow-demo-" + Math.random().toString(36).slice(2, 10);
    const flow = document.getElementById('flow');
    const sessionState = {
      primary_decision: null,
      primary_reason: null,
      primary_domain: null,
      continuation_active: false,
      safe_continuation: null
    };

    function mapDecision(raw, note) {
      const v = String(raw || '').toUpperCase();
      if (String(note || '').toUpperCase().includes("CONTINUING")) return "CONTINUING";
      if (v === "PASS") return "PASS";
      if (v === "CONTAIN") return "CONTAINED";
      if (v === "HARD_STOP" || v === "STOP" || v === "FORCE_REVISE") return "BLOCKED";
      return v || "UNKNOWN";
    }

    function outcomeLanguage(decision) {
      if (decision === "PASS") return "Released";
      if (decision === "BLOCKED") return "Not admitted";
      if (decision === "CONTAINED") return "Needs more information";
      if (decision === "CONTINUING") return "Structured follow-up updated";
      return decision;
    }

    function decisionClass(d) {
      if (d === "PASS") return "released";
      if (d === "BLOCKED") return "blocked";
      if (d === "CONTAINED") return "contained";
      if (d === "CONTINUING") return "continuing";
      return "";
    }

    function safeContinuation(text, rationale) {
      const t = String(text || "").toLowerCase();
      const r = String(rationale || "").toLowerCase();
      if (r.includes("financial_facts_summary") || t.includes("financial facts summary")) return "financial_facts_summary";
      if (r.includes("neutral_timeline") || t.includes("neutral timeline") || t.includes("case timeline")) return "neutral_timeline";
      if (r.includes("medical_post_refusal_safe_followup")) return "medical_post_refusal_safe_followup";
      return null;
    }

    function detectPrimaryReason(flags, domain) {
      const arr = Array.isArray(flags) ? flags : [];
      const norm = arr.map(x => String(x || "").toLowerCase());
      if (norm.includes("personalized_financial_advice")) return "personalized_financial_advice";
      if (norm.includes("personalized_legal_advice")) return "personalized_legal_advice";
      if (domain === "finance") return "personalized_financial_advice";
      if (domain === "legal") return "personalized_legal_advice";
      return norm[0] || "policy_refusal";
    }

    function detectContinuationUpdateSlot(prompt, domain) {
      const p = String(prompt || "").toLowerCase();
      if (domain === "finance") {
        if (p.includes("questions for the adviser")) return "questions_for_adviser";
        if (p.includes("goal")) return "goal_or_concern";
        if (p.includes("amount")) return "amounts_involved";
        if (p.includes("account") || p.includes("asset")) return "accounts_or_assets";
        if (p.includes("risk")) return "risk_constraints";
        if (p.includes("date")) return "relevant_dates";
      }
      return "structured_update";
    }

    function renderFinanceSummaryBody(text) {
      let out = String(text || "");
      out = out.replace(/^Case timeline\b/m, "Financial facts summary");
      // Field label as slot, not timeline event.
      out = out.replace(/^\s*[•*-]\s*\[Undated\]\s*Questions for the adviser\s*$/gim, "• Questions for the adviser: [not yet specified]");
      return out;
    }

    function releasePath(decision, llmCalled) {
      if (decision === "BLOCKED") return llmCalled ? "blocked_after_generation" : "blocked_before_generation";
      if (decision === "PASS") return "released";
      if (decision === "CONTINUING") return "continuation_updated";
      if (decision === "CONTAINED") return "needs_more_information";
      return "unknown";
    }

    function plainWhy(decision, domain, text) {
      if (decision === "BLOCKED" && domain === "finance") return "A financial decision request was refused.";
      if (decision === "BLOCKED" && domain === "legal") return "A legal case-outcome request was refused.";
      if (decision === "PASS") return "The request was admissible and released.";
      if (decision === "CONTINUING") return "Valid structured input was applied to the active follow-up.";
      return "More information is needed to proceed safely.";
    }

    function addTurn(ui) {
      const el = document.createElement('section');
      el.className = 'turn';
      el.innerHTML = `
        <div class="grid">
          <div class="card">
            <h3 class="title">1. Request</h3>
            <pre>${ui.request}</pre>
            <div style="margin-top:6px;color:var(--muted)">domain: ${ui.domain}</div>
          </div>
          <div class="card">
            <h3 class="title">2. Decision</h3>
            <div style="margin-bottom:8px">
              <div style="color:var(--muted);font-size:12px">Primary decision</div>
              <div class="decision ${decisionClass(ui.primaryDecision)}">${ui.primaryDecision}</div>
              <div style="margin-top:4px">${ui.primaryWhy}</div>
            </div>
            <div>
              <div style="color:var(--muted);font-size:12px">Current turn</div>
              <div class="decision ${decisionClass(ui.currentTurnStatus)}">${ui.currentTurnStatus}</div>
              <div style="margin-top:4px">${ui.currentTurnWhy}</div>
            </div>
          </div>
        </div>
        <div class="grid">
          <div class="card">
            <h3 class="title">3. User-facing output</h3>
            <pre>${ui.userOutput}</pre>
          </div>
          <div class="card">
            <h3 class="title">4. Integration payload</h3>
            <pre>${JSON.stringify(ui.payload, null, 2)}</pre>
          </div>
        </div>`;
      flow.prepend(el);
    }

    async function runTurn() {
      const domain = document.getElementById('domain').value;
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return;
      const body = {
        model: "gpt-4o-mini",
        messages: [{ role: "user", content: prompt }]
      };
      const r = await fetch(API_BASE + "/v1/chat/completions", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-aurora-session-id": sid,
          "x-aurora-domain-hint": domain,
          "x-aurora-operator-detail": "1"
        },
        body: JSON.stringify(body)
      });
      const data = await r.json();
      const aurora = data.aurora || {};
      const message = (((data.choices || [])[0] || {}).message || {}).content || "";
      const decision = mapDecision(aurora.governance, aurora.governance_note);
      const flags = Array.isArray(aurora.flags) ? aurora.flags : [];
      const llmCalled = Boolean(aurora.original_response);
      const sc = safeContinuation(message, aurora.rationale);
      const isBlocked = decision === "BLOCKED";
      if (isBlocked) {
        sessionState.primary_decision = "BLOCKED";
        sessionState.primary_reason = detectPrimaryReason(flags, domain);
        sessionState.primary_domain = domain;
        sessionState.continuation_active = Boolean(sc);
        sessionState.safe_continuation = sc;
      }
      const isContinuationUpdate = sessionState.continuation_active && decision === "CONTINUING";
      const currentTurnStatus = isContinuationUpdate ? "CONTINUING" : decision;
      const primaryDecision = sessionState.primary_decision || decision;
      const primaryWhy = sessionState.primary_decision
        ? ((sessionState.primary_domain === "finance")
            ? "A financial decision request was refused."
            : (sessionState.primary_domain === "legal")
              ? "A legal case-outcome request was refused."
              : plainWhy(primaryDecision, domain, message))
        : plainWhy(primaryDecision, domain, message);
      const currentTurnWhy = isContinuationUpdate
        ? ("Update applied: " + detectContinuationUpdateSlot(prompt, domain))
        : plainWhy(currentTurnStatus, domain, message);
      const displayOutput = (sessionState.primary_domain === "finance" && sessionState.continuation_active)
        ? renderFinanceSummaryBody(message)
        : message;
      const payload = {
        decision: primaryDecision,
        domain,
        flags,
        release_path: releasePath(currentTurnStatus, llmCalled),
        llm_called: llmCalled,
        safe_continuation: sessionState.safe_continuation || sc,
        rationale: aurora.rationale || null,
        trace_id: aurora.audit_id || null
      };
      addTurn({
        request: prompt,
        domain,
        primaryDecision,
        primaryWhy: "Reason: " + (sessionState.primary_reason || "policy_refusal"),
        currentTurnStatus,
        currentTurnWhy,
        userOutput: displayOutput,
        payload
      });
    }

    document.getElementById('send').addEventListener('click', runTurn);
  </script>
</body>
</html>
